<svg xmlns="http://www.w3.org/2000/svg" width="220" height="60" viewBox="0 0 220 60">
  <!-- Circular logo background -->
  <circle cx="30" cy="30" r="28" fill="#1e3a8a"/>
  
  <!-- Right half grey circle -->
  <path d="M 30 2 A 28 28 0 0 1 30 58 Z" fill="#374151"/>
  
  <!-- A letter (left half, blue) -->
  <path d="M 18 42 L 22 32 L 30 32 L 34 42 M 24 38 L 28 38" 
        stroke="#ffffff" 
        stroke-width="2.5" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        clip-path="url(#left-half)"/>
  
  <!-- H letter (right half, grey) -->
  <path d="M 30 32 L 30 42 M 30 37 L 42 37 M 42 32 L 42 42" 
        stroke="#ffffff" 
        stroke-width="2.5" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        clip-path="url(#right-half)"/>
  
  <defs>
    <clipPath id="left-half">
      <rect x="2" y="2" width="28" height="56"/>
    </clipPath>
    <clipPath id="right-half">
      <rect x="30" y="2" width="28" height="56"/>
    </clipPath>
  </defs>
  
  <!-- AHGROUP text -->
  <text x="70" y="28" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1e3a8a" letter-spacing="0.5px">AH</text>
  <text x="108" y="28" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#374151" letter-spacing="0.5px">GROUP</text>
  
  <!-- Tagline -->
  <text x="70" y="46" font-family="Arial, sans-serif" font-size="11" fill="#374151" letter-spacing="0.3px">Data.Intelligence.Results.</text>
</svg>
